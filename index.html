<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamOS</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
      :root {
        --bg-deep:    #060610;
        --bg-base:    #0c0c1a;
        --bg-card:    #12121f;
        --bg-elevated:#1a1a2e;
        --border:     #1e1e35;
        --border-soft:#252540;
        --accent:     #6c63ff;
        --accent-2:   #ff4d8d;
        --accent-3:   #00e5b0;
        --accent-warn:#ffb800;
        --accent-err: #ff4757;
        --text:       #e8e8f5;
        --text-muted: #5a5a80;
        --text-dim:   #8888aa;
        --gradient:   linear-gradient(135deg, #6c63ff, #ff4d8d);
        --glow:       0 0 20px rgba(108,99,255,.25);
        --card-shadow:0 4px 24px rgba(0,0,0,.4);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        height: 100%;
        background: var(--bg-deep);
        color: var(--text);
        font-family: 'Space Grotesk', sans-serif;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-card); }
      ::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

      /* === ANIMATIONS === */
      @keyframes fadeInUp {
        from { opacity:0; transform:translateY(16px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity:0; }
        to   { opacity:1; }
      }
      @keyframes slideInLeft {
        from { opacity:0; transform:translateX(-20px); }
        to   { opacity:1; transform:translateX(0); }
      }
      @keyframes pulse-glow {
        0%,100% { box-shadow: 0 0 0 0 rgba(108,99,255,0); }
        50%      { box-shadow: 0 0 0 6px rgba(108,99,255,.2); }
      }
      @keyframes shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes bounce-in {
        0%  { transform: scale(0.8); opacity:0; }
        60% { transform: scale(1.05); }
        100%{ transform: scale(1); opacity:1; }
      }
      @keyframes gradient-shift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .animate-fadeInUp { animation: fadeInUp .45s ease both; }
      .animate-fadeIn   { animation: fadeIn   .3s  ease both; }
      .animate-slideInLeft { animation: slideInLeft .35s ease both; }
      .animate-bounceIn { animation: bounce-in .4s ease both; }

      /* stagger delays */
      .delay-1 { animation-delay: .05s; }
      .delay-2 { animation-delay: .10s; }
      .delay-3 { animation-delay: .15s; }
      .delay-4 { animation-delay: .20s; }
      .delay-5 { animation-delay: .25s; }
      .delay-6 { animation-delay: .30s; }

      /* === CARDS === */
      .s-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        transition: border-color .2s, box-shadow .2s, transform .2s;
      }
      .s-card:hover { border-color: var(--border-soft); box-shadow: var(--card-shadow); }
      .s-card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.5); }

      /* === INPUTS === */
      .s-input {
        width: 100%;
        background: var(--bg-base);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        padding: 10px 14px;
        font-size: 14px;
        font-family: 'Space Grotesk', sans-serif;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
      }
      .s-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(108,99,255,.15);
      }
      .s-input::placeholder { color: var(--text-muted); }

      /* === BUTTONS === */
      .s-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border: none;
        border-radius: 8px;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        padding: 9px 18px;
        transition: all .2s;
        text-decoration: none;
      }
      .s-btn:active { transform: scale(.97); }
      .s-btn-primary { background: var(--accent); color: #fff; }
      .s-btn-primary:hover { background: #7b74ff; box-shadow: var(--glow); }
      .s-btn-danger  { background: var(--accent-err); color: #fff; }
      .s-btn-danger:hover  { background: #ff5c6a; }
      .s-btn-ghost   { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-dim); }
      .s-btn-ghost:hover   { border-color: var(--border-soft); color: var(--text); }
      .s-btn-sm { padding: 6px 12px; font-size: 12px; }

      /* === NAV SIDEBAR === */
      .sidebar {
        width: 230px;
        min-width: 230px;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        height: 100vh;
        position: sticky;
        top: 0;
        animation: slideInLeft .3s ease both;
      }
      .sidebar-logo {
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-logo .logo-text {
        font-size: 22px;
        font-weight: 800;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% 200%;
        animation: gradient-shift 4s ease infinite;
      }
      .sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        border-left: 2px solid transparent;
        transition: all .18s;
        border-radius: 0 8px 8px 0;
        margin: 1px 8px 1px 0;
      }
      .nav-item:hover { color: var(--text); background: rgba(108,99,255,.07); }
      .nav-item.active {
        color: var(--accent);
        background: rgba(108,99,255,.12);
        border-left-color: var(--accent);
      }

      /* === STATUS BADGES === */
      .badge-ready      { background: rgba(0,229,176,.15); color: #00e5b0; }
      .badge-processing { background: rgba(108,99,255,.2); color: #8b85ff; }
      .badge-queued     { background: rgba(255,184,0,.15); color: #ffb800; }
      .badge-error      { background: rgba(255,71,87,.15); color: #ff4757; }
      .badge-uploading  { background: rgba(90,90,128,.15); color: var(--text-muted); }
      .badge-cancelled  { background: rgba(90,90,128,.15); color: var(--text-muted); }
      .s-badge {
        display: inline-block;
        padding: 2px 9px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 600;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: .3px;
      }

      /* === STAT CARDS === */
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px 20px;
        transition: all .2s;
        position: relative;
        overflow: hidden;
      }
      .stat-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: var(--gradient);
        opacity: 0;
        transition: opacity .2s;
      }
      .stat-card:hover::before { opacity: 1; }
      .stat-card:hover { border-color: var(--border-soft); transform: translateY(-2px); box-shadow: var(--card-shadow); }

      /* === PROGRESS BAR === */
      .s-progress {
        height: 6px;
        background: var(--bg-elevated);
        border-radius: 3px;
        overflow: hidden;
      }
      .s-progress-bar {
        height: 100%;
        border-radius: 3px;
        transition: width .4s ease;
        background: var(--accent);
      }

      /* === TABLE === */
      .s-table { width: 100%; border-collapse: separate; border-spacing: 0; }
      .s-table th {
        padding: 10px 14px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        font-weight: 700;
        border-bottom: 1px solid var(--border);
        background: var(--bg-card);
        position: sticky;
        top: 0;
      }
      .s-table td {
        padding: 11px 14px;
        font-size: 13px;
        border-bottom: 1px solid var(--border);
        transition: background .15s;
      }
      .s-table tr:hover td { background: rgba(108,99,255,.04); }

      /* === UPLOAD DROPZONE === */
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: all .2s;
        background: var(--bg-base);
      }
      .dropzone:hover, .dropzone.drag-over {
        border-color: var(--accent);
        background: rgba(108,99,255,.06);
      }

      /* === SKELETON LOADER === */
      .skeleton {
        background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--border) 50%, var(--bg-elevated) 75%);
        background-size: 400px 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 6px;
      }

      /* === SWAL DARK THEME OVERRIDE === */
      .swal2-popup {
        background: var(--bg-elevated) !important;
        color: var(--text) !important;
        border: 1px solid var(--border-soft) !important;
        border-radius: 14px !important;
        font-family: 'Space Grotesk', sans-serif !important;
      }
      .swal2-title { color: var(--text) !important; font-size: 1.2rem !important; }
      .swal2-html-container { color: var(--text-dim) !important; }
      .swal2-confirm {
        background: var(--accent) !important;
        border-radius: 8px !important;
        font-family: 'Space Grotesk', sans-serif !important;
        font-weight: 600 !important;
      }
      .swal2-cancel {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-soft) !important;
        color: var(--text-dim) !important;
        border-radius: 8px !important;
        font-family: 'Space Grotesk', sans-serif !important;
        font-weight: 600 !important;
      }
      .swal2-cancel:hover { background: var(--border) !important; color: var(--text) !important; }
      .swal2-icon { border-color: var(--border-soft) !important; }
      .swal2-icon.swal2-warning { border-color: var(--accent-warn) !important; color: var(--accent-warn) !important; }
      .swal2-icon.swal2-error   { border-color: var(--accent-err)  !important; color: var(--accent-err)  !important; }
      .swal2-icon.swal2-success { border-color: var(--accent-3)    !important; color: var(--accent-3)    !important; }
      .swal2-icon.swal2-success .swal2-success-ring { border-color: rgba(0,229,176,.3) !important; }
      .swal2-icon.swal2-success [class^=swal2-success-line] { background: var(--accent-3) !important; }
      .swal2-loader { border-color: var(--accent) transparent var(--accent) transparent !important; }

      /* === MONOSPACE === */
      .mono { font-family: 'JetBrains Mono', monospace; }

      /* === MISC === */
      .text-gradient {
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
      .icon-box {
        width: 36px; height: 36px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
